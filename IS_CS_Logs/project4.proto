syntax = "proto3";

service project4Service {
    rpc ClientTransaction (ClientTransactionRequest) returns (ClientTransactionResponse);
    rpc ReplicaPrePrepare(PrePrepareRequest) returns (PrePrepareResponse);
    rpc Prepare(PrepareRequest) returns (PrepareResponse);
    rpc PrepareBroadcast(PrepareBroadcastRequest) returns (PrepareBroadcastResponse);
    rpc Commit(CommitRequest) returns (CommitResponse);
    rpc CommitBroadcast(CommitBroadcastRequest) returns (CommitBroadcastResponse);
    rpc ResetServerState (ResetServerStateRequest) returns (ResetServerStateResponse);
    rpc GetServerBalances (BalancesRequest) returns (BalancesResponse);
    rpc ViewChange (ViewChangeRequest) returns (ViewChangeResponse);
    rpc NewView (NewViewRequest) returns (NewViewResponse);
    rpc PrintLog (PrintLogRequest) returns (PrintLogResponse);
    rpc PrintStatus (PrintStatusRequest) returns (PrintStatusResponse);
    rpc PrintView (PrintViewRequest) returns (PrintViewResponse);
    rpc ChangeServerTimeout (ChangeServerTimeoutRequest) returns (ChangeServerTimeoutResponse);
    rpc Transact (TransactionRequest) returns (TransactionResponse);
    rpc Promise (PromiseRequest) returns (PromiseResponse);
    rpc Acknowledge(AcknowledgeRequest) returns (AcknowledgeResponse);
    rpc Accept(AcceptRequest) returns (AcceptResponse);
    rpc Accepted(AcceptedRequest) returns (AcceptedResponse);
    //rpc Commit(CommitRequest) returns (CommitResponse);
    rpc GetBalance (GetBalanceRequest) returns (GetBalanceResponse);
    rpc GetLogs (GetLogRequest) returns (GetLogResponse);
    rpc GetDB(GetDBRequest) returns (GetDBResponse);
    rpc UpdateDB(UpdateDBRequest) returns (UpdateDBResponse);
    rpc GetPendingTransactions (GetPendingTransactionsRequest) returns (GetPendingTransactionsResponse);
    rpc SetPendingTransactions (SetPendingTransactionsRequest) returns (SetPendingTransactionsResponse);
    rpc SendDataStore (SendDataStoreRequest) returns (SendDataStoreResponse);
    rpc ModifyDataStore (ModifyDataStoreRequest) returns (ModifyDataStoreResponse);
    rpc Catchup (CatchupRequest) returns (CatchupResponse);
    rpc ClientTransactionCrossShard (ClientTransactionCrossShardRequest) returns (ClientTransactionCrossShardResponse);
    rpc GetDataStore (GetDataStoreRequest) returns (GetDataStoreResponse);
    rpc sendDataStore (sendDataStoreRequest) returns (sendDataStoreResponse);
    rpc BroadcastDataStoreCommit (BroadcastDataStoreCommitRequest) returns (BroadcastDataStoreCommitResponse);
    rpc sendData (sendDataRequest) returns (sendDataResponse);
    rpc send2PCommit (send2PCommitRequest) returns (send2PCommitResponse);
    rpc send2PAck (send2PAckRequest) returns (send2PAckResponse);
    rpc ClientTransactionTripleCrossShard (ClientTransactionTripleCrossShardRequest) returns (ClientTransactionTripleCrossShardResponse);
}
message ClientTransactionTripleCrossShardRequest {
    string name = 1;
    //int32 value = 2;
    string message = 3;  // Field for the message
    int64 timestamp = 4; // Change to int64 for Unix timestamp
    bytes signature = 5;
    repeated string server_list_1 = 6;
    repeated string server_list_2 = 7;
    repeated string byzantine_list = 8;
    int32 view_number = 9;
    bool isIntraShard = 10;
    repeated string contact_server_list = 11;
    bytes signature_1 = 12;
    bytes signature_2 = 13;
    bool isPendingTrans = 14;
    repeated string server_list_3 = 15;
    bytes signature_3 = 16;

}
message ClientTransactionTripleCrossShardResponse {
    bool response = 1;
}
message send2PCommitRequest{
    string transaction = 1;
    string commitblock = 2;
}
message send2PCommitResponse{
    
}
message send2PAckRequest{
    string transaction = 1;
}
message send2PAckResponse{
    
}
message sendDataRequest{
    string transaction = 1;
}
message sendDataResponse{
    bool response = 1;
}

message BroadcastDataStoreCommitRequest{
    string transactions = 1;
    repeated string server_list = 2;
    repeated string byzantine_list = 3;
}
message BroadcastDataStoreCommitResponse{
    bool response = 1;
}
message sendDataStoreRequest{
    repeated string datastore = 1;
}
message sendDataStoreResponse{
    bool response = 1;
}
message GetDataStoreRequest{
    
}
message GetDataStoreResponse{
    repeated string datastore = 1;
}
message ClientTransactionCrossShardRequest {
    string name = 1;
    //int32 value = 2;
    string message = 3;  // Field for the message
    int64 timestamp = 4; // Change to int64 for Unix timestamp
    bytes signature = 5;
    repeated string server_list_1 = 6;
    repeated string server_list_2 = 7;
    repeated string byzantine_list = 8;
    int32 view_number = 9;
    bool isIntraShard = 10;
    repeated string contact_server_list = 11;
    bytes signature_1 = 12;
    bytes signature_2 = 13;
    bool isPendingTrans = 14;

}
message ClientTransactionCrossShardResponse {
    bool response = 1;
}
message CatchupRequest{
    repeated string logs = 1;
}
message CatchupResponse{
    bool message = 1;
}
message ModifyDataStoreRequest{
    string transaction = 1;
    repeated string server_list = 2;
}
message ModifyDataStoreResponse{
    bool message = 1;
}
message SendDataStoreRequest{
    string data = 1;
}
message SendDataStoreResponse{
    bool message = 1;
}

message SetPendingTransactionsRequest{
    string from_user = 1;
    string to_user= 2;
    int32 amount= 3;
}
message SetPendingTransactionsResponse{
    bool message =1;
}
message GetPendingTransactionsRequest{
    
}
message GetPendingTransactionsResponse{
    repeated string pending_transactions = 1;
}
message UpdateDBRequest{
    repeated string max_DB = 1;  
}
message UpdateDBResponse{
    bool success = 1;
}
message GetDBRequest{
    
}
message GetDBResponse{
    repeated string DB = 1;
}
message GetLogRequest{

}
message GetLogResponse{
    repeated string logs = 1;
}
message GetBalanceRequest{
    int32 client_id = 1;
}
message GetBalanceResponse{
    string balance = 1;
}
