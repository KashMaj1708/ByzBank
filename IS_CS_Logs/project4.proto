message AcceptedRequest{
    int32 accept_idp = 1;
    repeated string transaction_block = 2;
    repeated string server_list = 3;
    string acceptor = 4;
    string transaction = 5;
    bool isIntraShard = 6;
}
message AcceptedResponse{
    bool message = 1;
}
message AcceptRequest {
    int32 accept_request_idp = 1;
    repeated string transaction_block = 2;
    repeated string server_list = 3;
    string leader = 4;
    string transaction = 5;
    bool isIntraShard = 6;

}
message AcceptResponse{
    bool message = 1;
}
message AcknowledgeRequest{
    int32 promise_idp = 1;
    string acceptor = 2;
    repeated string local_transactions = 3;
    repeated string server_list = 4;
    repeated string accept_val = 5;
    int32 accept_idp = 6;
    string transaction = 7;
    bool isIntraShard = 8;
}
message AcknowledgeResponse{
    bool message = 1;
}
message PromiseRequest {
    int32 prepare_idp = 1;
    string proposer = 2;
    repeated string server_list = 3;
    string transaction = 4;
    bool isIntraShard = 5;
    
}
message PromiseResponse {
    string message = 1;
}
message TransactionRequest {
    string from_user = 1; 
    string to_user = 2;     
    int32 amount = 3; 
    repeated string serverList = 4; 
    string transaction = 5;
    bool isIntraShard = 6;
    bool isRollBack = 7;
}
message TransactionResponse {
    string message = 1;
}

message ChangeServerTimeoutRequest {
}
message ChangeServerTimeoutResponse {

}
message PrintViewRequest {
}
message PrintViewResponse {
    string view_logs = 1;
}
message PrintStatusRequest {
    int32 sequence_number = 1;
}
message PrintStatusResponse {
    string status = 1;
}
message PrintLogRequest {
}
message PrintLogResponse {
    string log = 1;
}

message NewViewRequest {
    int32 view_number = 1;
    string name = 2;
    bytes signature = 3;
    repeated ViewChangeRequest view_certificate  = 4;
    repeated string byzantine_list = 5;

}
message NewViewResponse {
    bool response = 1;
}
message ViewChangeRequest {
    int32 view_number = 1;
    string name = 2;
    bytes signature = 3;
    repeated string server_list = 4;
    repeated string byzantine_list = 5;
}
message ViewChangeResponse{
    bool response = 1;
}
message BalancesRequest {
}
message BalancesResponse {
    map<string, int32> balances = 1;
}
message ResetServerStateRequest {
}

message ResetServerStateResponse {
    bool reset_successful = 1;
    string server_port = 2;
}
message CommitBroadcastRequest {
    int32 view_number = 1;
    int32 sequence_number = 2;
    string name = 3;
    bytes signature = 4;
    repeated CommitRequest commit_requests_block = 5;
    string digest = 6;
    repeated string server_list = 7;
    repeated string byzantine_list = 8;
    bool isIntrashard = 9;
}
message CommitBroadcastResponse {
    bool response = 1;
}
message CommitRequest {
    string digest = 1;
    int32 view_number = 2;
    int32 sequence_number = 3;
    string name = 4;
    bytes signature = 5;
    repeated string server_list = 6;
    repeated string byzantine_list = 7;
    bool isIntrashard = 8;
}
message CommitResponse {
    bool response = 1;
}
message PrepareBroadcastRequest {
    int32 view_number = 1;
    int32 sequence_number = 2;
    string name = 3;
    bytes signature = 4;
    repeated PrepareRequest prepare_requests_block = 5;
    string digest = 6;
    repeated string server_list = 7;
    repeated string byzantine_list = 8;
    bool isIntrashard = 9;
}
message PrepareBroadcastResponse {
    bool response = 1;
}
message PrepareRequest {
    string digest = 1;
    int32 view_number = 2;
    int32 sequence_number = 3;
    string name = 4;
    bytes signature = 5;
    repeated string server_list = 6;
    repeated string byzantine_list = 7;
    bool isIntrashard = 8;
}

message PrepareResponse{
    string response = 1;
}
message PrePrepareRequest {
    string digest = 1;
    int32 sequence_number = 2;
    int32 view_number = 3;
    ClientTransactionRequest client_request = 4;
    bytes signature = 5;
    string name = 6;
    repeated string server_list = 7;
    repeated string byzantine_list = 8;
    bool isIntraShard = 9;
}
message PrePrepareResponse {
    string response = 1;
}

message ClientTransactionRequest {
    string name = 1;
    int32 value = 2;
    string message = 3;  // Field for the message
    int64 timestamp = 4; // Change to int64 for Unix timestamp
    bytes signature = 5;
    repeated string server_list = 6;
    repeated string byzantine_list = 7;
    int32 view_number = 8;
    bool isIntraShard = 9;
    bool isRollBack = 10;
    repeated string contact_server_list = 11;
    bool isPendingTrans = 12;
    ClientTransactionCrossShardRequest cross_shard_request = 13;
    string commitblock = 14;
}

message ClientTransactionResponse {
    string response = 1;
}